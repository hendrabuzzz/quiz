<!DOCTYPE html>
<html>
<head><title>Setup Questions</title>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
<style>body{font-family:Arial;padding:20px;background:#f5f5f5;}h1{color:#333;}p{margin:10px 0;}</style>
</head>
<body>
<h1>đźš€ Generating Questions from Web...</h1>
<div id="status"></div>

<script>
firebase.initializeApp({apiKey:"AIzaSyAOU3BIcy8DgaZ3xoCPVoc3Qnmhniu1VBQ",authDomain:"quiz-platform-18585.firebaseapp.com",projectId:"quiz-platform-18585",storageBucket:"quiz-platform-18585.firebasestorage.app",messagingSenderId:"446597744668",appId:"1:446597744668:web:e632f18ee552809856b7d9"});
const db=firebase.firestore();

async function generateQuestions(){
    const status=document.getElementById('status');
    status.innerHTML='<p>đź“Ą Fetching olympiad questions from web...</p>';
    
    try{
        const response=await fetch('https://api.anthropic.com/v1/messages',{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({
                model:'claude-sonnet-4-6',
                max_tokens:4000,
                messages:[{
                    role:'user',
                    content:`Generate 150 English olympiad multiple-choice questions for Kelas 4-5 students. Split into 3 levels: 50 Easy (basic grammar/vocab), 50 Normal (intermediate), 50 Hard (advanced).

Format as JSON ONLY: {"easy":[{"q":"text","o":["A","B","C","D"],"a":0}...],"normal":[...],"hard":[...]}

Make questions diverse, realistic, and from actual olympiad style (SOF, IEO format).`
                }]
            })
        });
        
        const data=await response.json();
        let jsonText=data.content[0].text;
        jsonText=jsonText.replace(/\`\`\`json\n?/g,'').replace(/\`\`\`\n?/g,'').trim();
        const questions=JSON.parse(jsonText);
        
        status.innerHTML+='<p>âś… Generated '+questions.easy.length+' Easy, '+questions.normal.length+' Normal, '+questions.hard.length+' Hard questions</p>';
        status.innerHTML+='<p>đź’ľ Saving to Firebase...</p>';
        
        await db.collection('olympiad_questions').doc('all').set({
            easy:questions.easy,
            normal:questions.normal,
            hard:questions.hard,
            lastUpdated:new Date(),
            source:'Claude-Generated'
        });
        
        status.innerHTML+='<p style="color:green;font-weight:bold;">âś… SUCCESS! All questions saved to Firebase!</p>';
        status.innerHTML+='<p>You can now:</p>';
        status.innerHTML+='<p>1. Delete this file (setup-questions.html)</p>';
        status.innerHTML+='<p>2. Go to: <a href="https://hendrabuzzz.github.io/quiz" target="_blank">https://hendrabuzzz.github.io/quiz</a></p>';
        status.innerHTML+='<p>3. Start taking quizzes!</p>';
    }catch(e){
        status.innerHTML+='<p style="color:red;"><b>âťŚ Error:</b> '+e.message+'</p>';
        console.error(e);
    }
}

generateQuestions();
</script>
</body>
</html>
